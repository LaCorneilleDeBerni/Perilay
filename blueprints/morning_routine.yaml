blueprint:
  name: "Perilay — Routine du matin"
  description: >
    Imprime chaque matin une page personnalisee sur une imprimante thermique PeriPage.
    Contenu : titre avec prenom, date du jour, image aleatoire, phrase d'encouragement,
    rendez-vous du jour, phrase finale.

    Prerequis :
      - Addon Perilay installe et configure
      - rest_command.peripage_print configure dans configuration.yaml
      - Helpers : input_number (nb images), input_select (encouragements), input_select (phrases finales)
      - Images nommees image_00001.png, image_00002.png... dans /config/www/images/
  domain: automation
  input:

    section_titre:
      name: "1 - Titre"
      icon: mdi:format-title
      collapsed: false
      input:
        prenom:
          name: Prenom
          description: Prenom affiche dans le titre (ex. Sophie -> "Bonjour Sophie !").
          default: "Sophie"
          selector:
            text:

        print_time:
          name: Heure d'impression
          description: Heure a laquelle la routine est imprimee chaque matin.
          default: "07:00:00"
          selector:
            time:

    section_photo:
      name: "2 - Photo aleatoire"
      icon: mdi:image
      collapsed: false
      input:
        image_count:
          name: Nombre d'images
          description: Nombre total d'images disponibles dans votre dossier.
          selector:
            entity:
              domain: input_number

        image_folder:
          name: Dossier des images
          description: "Chemin relatif depuis /local/ (ex. Maurice, images, photos)."
          default: "images"
          selector:
            text:

        image_prefix:
          name: "Prefixe des images"
          description: >
            Debut du nom de vos fichiers avant le numero.
            Exemple : Maurice_00001.png -> entrez Maurice_
          default: "image_"
          selector:
            text:

    section_encouragement:
      name: "3 - Phrase d'encouragement"
      icon: mdi:heart
      collapsed: false
      input:
        encouragements:
          name: Phrases d'encouragement
          description: input_select contenant vos phrases d'encouragement.
          selector:
            entity:
              domain: input_select

    section_calendrier:
      name: "4 - Calendriers"
      icon: mdi:calendar
      collapsed: false
      input:
        calendar_1:
          name: Calendrier 1
          description: Premier calendrier a inclure dans les RDV du jour.
          selector:
            entity:
              domain: calendar

        calendar_2:
          name: Calendrier 2 (optionnel)
          description: "Deuxieme calendrier a inclure."
          default: ""
          selector:
            entity:
              domain: calendar

        calendar_3:
          name: Calendrier 3 (optionnel)
          description: "Troisieme calendrier a inclure."
          default: ""
          selector:
            entity:
              domain: calendar

    section_closing:
      name: "5 - Phrase finale"
      icon: mdi:star
      collapsed: false
      input:
        closings:
          name: Phrases finales
          description: input_select contenant vos phrases finales affectueuses.
          selector:
            entity:
              domain: input_select

    section_connexion:
      name: "6 - Connexion"
      icon: mdi:printer
      collapsed: false
      input:
        ha_ip:
          name: IP de Home Assistant
          description: "Adresse IP locale de votre serveur HA (ex. 192.168.1.100)."
          default: "192.168.1.100"
          selector:
            text:

        ha_port:
          name: Port de l'addon Perilay
          description: "Port HTTP configure dans l'addon (defaut 8766)."
          default: 8766
          selector:
            number:
              min: 1024
              max: 65535

trigger:
  - platform: time
    at: !input print_time

variables:
  prenom: !input prenom
  image_count_entity: !input image_count
  image_folder: !input image_folder
  image_prefix: !input image_prefix
  encouragements_entity: !input encouragements
  closings_entity: !input closings
  calendar_1_entity: !input calendar_1
  calendar_2_entity: !input calendar_2
  calendar_3_entity: !input calendar_3
  ha_ip: !input ha_ip
  ha_port: !input ha_port

  date_fr: >
    {% set jours = ['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'] %}
    {% set mois = ['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'] %}
    {{ jours[now().weekday()] }} {{ now().day }} {{ mois[now().month - 1] }} {{ now().year }}

  image_num: >
    {{ range(1, (states(image_count_entity) | int) + 1) | list | random }}
  image_url: >
    {{ 'http://' ~ ha_ip ~ ':8123/local/' ~ image_folder ~ '/' ~ image_prefix
       ~ (image_num | string).zfill(5) ~ '.png' }}

  encouragement: >
    {% set opts = state_attr(encouragements_entity, 'options') %}
    {{ opts | random }}

  closing: >
    {% set opts = state_attr(closings_entity, 'options') %}
    {{ opts | random }}

  rdv_list: >
    {% set calendars = [calendar_1_entity, calendar_2_entity, calendar_3_entity] %}
    {% set ns = namespace(rdvs=[]) %}
    {% for cal in calendars %}
      {% if cal and states(cal) == 'on' %}
        {% set title = state_attr(cal, 'message') | default('RDV') %}
        {% set start = state_attr(cal, 'start_time') | default('') %}
        {% if start %}
          {% set heure = start[11:16] %}
          {% set ns.rdvs = ns.rdvs + [heure ~ ' - ' ~ title] %}
        {% else %}
          {% set ns.rdvs = ns.rdvs + [title] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.rdvs }}

  appointments: >
    {% if rdv_list | length == 0 %}
      {{ ["Pas de RDV aujourd'hui - profitez-en !"] }}
    {% else %}
      {{ rdv_list | sort }}
    {% endif %}

action:
  - service: rest_command.peripage_print
    data:
      payload: >-
        {"blocks": [{"type": "title", "text": "Bonjour {{ prenom }} !", "align": "center"},{"type": "separator"},{"type": "text", "text": "{{ date_fr }}", "align": "center", "font_size": 20},{"type": "separator"},{"type": "image_url", "url": "{{ image_url }}"},{"type": "separator"},{"type": "text", "text": "{{ encouragement }}", "align": "center", "font_size": 22},{"type": "separator"},{"type": "title", "text": "Aujourd'hui"},{"type": "list", "items": {{ appointments | tojson }}},{"type": "separator"},{"type": "text", "text": "{{ closing }}", "align": "center"}]}

mode: single
