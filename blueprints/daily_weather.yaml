blueprint:
  name: "Perilay — Météo du jour"
  description: >
    Imprime chaque matin un résumé météo complet sur une imprimante thermique PeriPage.
    Contenu : titre, date, conditions, température actuelle, min/max, vent, pression,
    humidité et une phrase selon la météo du jour.

    Prérequis :
      - Addon Perilay installé et configuré
      - rest_command.peripage_print configuré dans configuration.yaml
  domain: automation
  input:

    section_meteo:
      name: "1 — Météo"
      icon: mdi:weather-partly-cloudy
      collapsed: false
      input:
        weather_entity:
          name: Entité météo
          description: Entité météo Home Assistant (ex. weather.forecast_home).
          default: "weather.forecast_home"
          selector:
            entity:
              domain: weather

        print_time:
          name: Heure d'impression
          description: Heure à laquelle la météo est imprimée chaque matin.
          default: "07:30:00"
          selector:
            time:

    section_connexion:
      name: "2 — Connexion"
      icon: mdi:printer
      collapsed: false
      input:
        ha_ip:
          name: IP de Home Assistant
          description: Adresse IP locale de votre serveur HA (ex. 192.168.1.100).
          default: "192.168.1.100"
          selector:
            text:

        ha_port:
          name: Port de l'addon Perilay
          description: Port HTTP configuré dans l'addon (défaut 8766).
          default: 8766
          selector:
            number:
              min: 1024
              max: 65535

trigger:
  - platform: time
    at: !input print_time

variables:
  weather_entity: !input weather_entity
  ha_ip: !input ha_ip
  ha_port: !input ha_port

  condition_map:
    clear-night: "Nuit claire"
    cloudy: "Nuageux"
    exceptional: "Conditions exceptionnelles"
    fog: "Brouillard"
    hail: "Grele"
    lightning: "Orage"
    lightning-rainy: "Orage pluvieux"
    partlycloudy: "Partiellement nuageux"
    pouring: "Pluie forte"
    rainy: "Pluvieux"
    snowy: "Neigeux"
    snowy-rainy: "Neige et pluie"
    sunny: "Ensoleille"
    windy: "Venteux"
    windy-variant: "Tres venteux"

  # Catégories pour la phrase finale
  sunny_conditions:
    - sunny
    - clear-night
  rainy_conditions:
    - rainy
    - pouring
    - lightning-rainy
    - snowy-rainy
    - hail
    - lightning
  night_conditions:
    - clear-night

  condition_raw: "{{ states(weather_entity) }}"
  condition_label: "{{ condition_map.get(condition_raw, condition_raw) }}"

  temperature: "{{ state_attr(weather_entity, 'temperature') | round(1) }}C"
  humidity: >
    {% set h = state_attr(weather_entity, 'humidity') %}
    {{ h ~ ' %' if h is not none else 'N/A' }}
  wind_speed: >
    {% set w = state_attr(weather_entity, 'wind_speed') %}
    {% set u = state_attr(weather_entity, 'wind_speed_unit') | default('km/h') %}
    {{ (w | round(1) ~ ' ' ~ u) if w is not none else 'N/A' }}
  pressure: >
    {% set p = state_attr(weather_entity, 'pressure') %}
    {% set u = state_attr(weather_entity, 'pressure_unit') | default('hPa') %}
    {{ (p | round(0) | int ~ ' ' ~ u) if p is not none else 'N/A' }}

  # Phrase finale selon la météo
  closing_phrase: >
    {% if condition_raw in night_conditions %}
    {% elif condition_raw in sunny_conditions %}
      Soleil radieux aujourd'hui !
    {% elif condition_raw in rainy_conditions %}
      Il faudra prendre son parapluie aujourd'hui :)
    {% else %}
      Esperons qu'il fera meilleur demain !
    {% endif %}

action:
  # Étape 1 : récupérer les prévisions via le service dédié
  - service: weather.get_forecasts
    target:
      entity_id: !input weather_entity
    data:
      type: daily
    response_variable: forecasts

  # Étape 2 : extraire min/max
  - variables:
      temp_low: >
        {% set f = forecasts[weather_entity].forecast %}
        {% if f and f | length > 0 and f[0].templow is defined %}
          {{ f[0].templow | round(1) }}C
        {% else %}
          N/A
        {% endif %}
      temp_high: >
        {% set f = forecasts[weather_entity].forecast %}
        {% if f and f | length > 0 and f[0].temperature is defined %}
          {{ f[0].temperature | round(1) }}C
        {% else %}
          N/A
        {% endif %}

  # Étape 3 : imprimer sans phrase si nuit, avec phrase sinon
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ closing_phrase | trim == '' }}"
        sequence:
          - service: rest_command.peripage_print
            data:
              payload: >-
                {"blocks": [
                  {"type": "title", "text": "Meteo du Jour", "align": "center"},
                  {"type": "text", "text": "{{ now().strftime('%A %d %B %Y') }}", "align": "center", "font_size": 20},
                  {"type": "separator", "style": "line"},
                  {"type": "text", "text": "{{ condition_label }}", "align": "center", "font_size": 26, "bold": true},
                  {"type": "separator", "style": "blank"},
                  {"type": "text", "text": "Actuellement : {{ temperature }}", "align": "center", "font_size": 24},
                  {"type": "separator", "style": "blank"},
                  {"type": "list", "items": ["Min : {{ temp_low }}", "Max : {{ temp_high }}", "Humidite : {{ humidity }}", "Vent : {{ wind_speed }}", "Pression : {{ pressure }}"], "bullet": "->", "font_size": 22},
                  {"type": "separator", "style": "dotted"}
                ]}
    default:
      - service: rest_command.peripage_print
        data:
          payload: >-
            {"blocks": [
              {"type": "title", "text": "Meteo du Jour", "align": "center"},
              {"type": "text", "text": "{{ now().strftime('%A %d %B %Y') }}", "align": "center", "font_size": 20},
              {"type": "separator", "style": "line"},
              {"type": "text", "text": "{{ condition_label }}", "align": "center", "font_size": 26, "bold": true},
              {"type": "separator", "style": "blank"},
              {"type": "text", "text": "Actuellement : {{ temperature }}", "align": "center", "font_size": 24},
              {"type": "separator", "style": "blank"},
              {"type": "list", "items": ["Min : {{ temp_low }}", "Max : {{ temp_high }}", "Humidite : {{ humidity }}", "Vent : {{ wind_speed }}", "Pression : {{ pressure }}"], "bullet": "->", "font_size": 22},
              {"type": "separator", "style": "line"},
              {"type": "text", "text": "{{ closing_phrase | trim }}", "align": "center", "font_size": 22}
            ]}

mode: single
